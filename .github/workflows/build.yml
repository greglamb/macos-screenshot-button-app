name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project from Project.yml
        run: xcodegen generate

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint (swift-format + SwiftLint)
        run: ./bin/lint

      - name: Build
        run: |
          xcodebuild \
            -project ScreenshotButton.xcodeproj \
            -scheme ScreenshotButton \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Run Tests
        run: |
          xcodebuild \
            -project ScreenshotButton.xcodeproj \
            -scheme ScreenshotButtonTests \
            -destination 'platform=macOS' \
            test

      - name: Verify app bundle
        run: |
          APP_PATH="build/Build/Products/Debug/ScreenshotButton.app"
          test -d "$APP_PATH" || { echo "App bundle not found"; exit 1; }
