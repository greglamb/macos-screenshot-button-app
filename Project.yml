name: ScreenshotButton

options:
  bundleIdPrefix: dev.greglamb
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: en
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # `0.0.0-dev` is the placeholder for local/dev builds. The postBuildScript
    # below swaps it for `dev-<shortsha>` so developers and testers can see
    # exactly which commit they're running. The release workflow overrides
    # MARKETING_VERSION on the xcodebuild command line with the stripped git
    # tag (e.g., `v1.2.3` → `1.2.3`), in which case the script is a no-op.
    MARKETING_VERSION: "0.0.0-dev"
    CURRENT_PROJECT_VERSION: "1"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ScreenshotButton:
    type: application
    platform: macOS
    sources:
      - path: ScreenshotButton
    postBuildScripts:
      - name: Inject Dev Version
        shell: /bin/bash
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(INFOPLIST_PATH)
        script: |
          PLIST="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          CURRENT=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo "")
          if [[ "$CURRENT" == "0.0.0-dev" ]]; then
              HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
              /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString dev-${HASH}" "$PLIST"
          fi
    info:
      path: ScreenshotButton/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSScreenCaptureUsageDescription: "ScreenshotButton needs screen recording access to capture windows and regions."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.greglamb.ScreenshotButton
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          # Sign local Debug builds with Developer ID Application so TCC
          # grants persist across rebuilds. The designated requirement
          # becomes (bundle id + team id + DevID cert chain) instead of
          # cdhash, which is stable across rebuilds — Screen Recording
          # grants once, stays granted. No secrets committed: the cert
          # name and team id are public, the private key lives in the
          # developer's Keychain. CI jobs (build.yml, release.yml) pass
          # their own CODE_SIGN_IDENTITY on the xcodebuild command line,
          # which overrides this setting; they are unaffected.
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: 35SBJGS259
          # Hardened runtime is required for notarized Release, but it
          # blocks the XCTest runner from injecting into the host app.
          # Disable for Debug only — Release still inherits YES from base.
          ENABLE_HARDENED_RUNTIME: NO
    scheme:
      testTargets:
        - ScreenshotButtonTests
      gatherCoverageData: true
      coverageTargets:
        - ScreenshotButton

  ScreenshotButtonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ScreenshotButtonTests
    dependencies:
      - target: ScreenshotButton
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.greglamb.ScreenshotButtonTests
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      testTargets:
        - ScreenshotButtonTests
